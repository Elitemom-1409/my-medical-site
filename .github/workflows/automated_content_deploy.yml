name: Daily Medical Site Automation

on:
  schedule:
    # This runs every day at midnight
    - cron: '0 0 * * *'
  workflow_dispatch:
    # This is the button you click to test it!

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run the Master Engine
        run: |
          # We are using a multi-line command now so Python can read it properly
          python -c "
          import sys
          import random
          sys.path.append('.')
          from core.pipeline.orchestrator import MasterOrchestrator
          from data.expander import GlossaryExpander
          
          expander = GlossaryExpander([])
          nodes = expander.expand()
          
          if nodes:
              orch = MasterOrche_orchestrator = MasterOrchestrator()
              orch.run_automation_cycle(random.choice(nodes))
          else:
              print('No topics found')
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Medical Bot"
          git config --global user.email "bot@medicalsite.com"
          git add content/

          git commit -m "🚀 New Medical Article Published Automatically!" || echo "No changes to commit"
          git push
