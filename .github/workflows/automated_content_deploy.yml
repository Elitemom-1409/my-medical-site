name: Daily Medical Site Automation

on:
  schedule:
    # This runs every day at midnight
    - cron: '0 0 * * *'
  workflow_dispatch:
    # This allows you to click a button to test it manually

permissions:
  contents: write # <--- THIS IS THE MAGIC KEY THAT FIXES THE 403 ERROR

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run the Master Engine
        run: python master_engine.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Medical Bot"
          git config --global user.email "bot@medicalsite.com"
          git add content/
          git commit -m "🚀 New Medical Article Published!" || echo "No changes to commit"
          git push
