name: Daily Medical Site Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run the Master Switch
        run: python run_all.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Medical Bot"
          git config --base_url "bot@medicalsite.com"
          git add content/
          git commit -m "🚀 New Medical Article Published!" || echo "No changes to commit"
          git push
